<style>
        body {
            min-height: 100dvh;
            background-color: #171c21;
            background-image: 
                linear-gradient(rgba(220, 20, 60, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(220, 20, 60, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 60;
            opacity: 0.3;
        }

        /* Dark Skeuomorphic Shadow Layers */
        .skeuo-raised {
            background: #1a1b26;
            box-shadow: 
                10px 10px 20px #0a0b10, 
                -5px -5px 15px rgba(255, 255, 255, 0.02),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(220, 20, 60, 0.15);
        }

        .skeuo-inset {
            background: #12131a;
            box-shadow: 
                inset 6px 6px 12px #0a0b10, 
                inset -2px -2px 6px rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.2);
        }

        .skeuo-button-red {
            background: linear-gradient(145deg, #dc143c, #920022);
            box-shadow: 
                0 4px 15px rgba(220, 20, 60, 0.3),
                inset 0 1px 1px rgba(255,255,255,0.2);
            border: 1px solid #ff4d6d;
        }

        .skeuo-button-red:active {
            background: #b1002c;
            box-shadow: 
                inset 2px 2px 5px #7a001e;
            transform: translateY(1px);
        }

        .skeuo-button-dark {
            background: #1a1b26;
            box-shadow: 
                6px 6px 12px #0a0b10, 
                -4px -4px 10px rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease;
        }

        .skeuo-button-dark:active {
            box-shadow: 
                inset 4px 4px 8px #0a0b10;
            border-color: rgba(220, 20, 60, 0.5);
            transform: translateY(1px);
        }

        .progress-track {
            background: #12131a;
            box-shadow: inset 2px 2px 5px #0a0b10, inset -1px -1px 2px rgba(255,255,255,0.02);
        }

        @keyframes timer-depletion {
            from { width: 100%; }
            to { width: 0%; }
        }

        .timer-fill {
            background: linear-gradient(90deg, #dc143c, #ff4d6d);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.5);
            animation: timer-depletion 10s linear forwards;
        }

        .glass-header {
            background: rgba(26, 27, 38, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(220, 20, 60, 0.2);
        }

        .neon-glow {
            text-shadow: 0 0 10px rgba(220, 20, 60, 0.8);
        }
    </style>
</head>
<body class="text-on-surface selection:bg-primary/30 selection:text-white overflow-hidden h-screen font-body-md">
<div class="scanlines"></div>
<div class="relative z-10 flex flex-col h-screen">
<!-- Header -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile py-sm glass-header"><div class="flex items-center gap-3 flex-1">
  <div class="w-10 h-10 rounded-full border-2 border-primary overflow-hidden skeuo-raised">
    <img class="w-full h-full object-cover grayscale" alt="User Avatar" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAcDbURSiOx5zVJjlgkhBXvMkY3ACG4qcgJUEdXZkDGJLuOSOwz9I89J4dmRIVZhSmzA65wlO2jY-sRJqGgTt-OHrZSYzjrgYarYfDieNFeKvE0SBuCMnyUHvf4ZklydgI-PepPlWgtO5Uvio0vxaKCULFos0jjyrZqH0wVzcM5frpIBm7CrzDZhJRda6auvbpNxrxTJD_TlwmV9SDPWmJtioibB91A93UzsJH_R1bo-N3iBE5jHpWEzbaioiK97nfG5Tp8kljx1Q">
  </div>
  <div class="flex flex-col">
    <span class="font-label-mono text-[10px] text-primary leading-none uppercase">12 DAYS</span>
    <span class="font-label-mono text-[10px] text-on-surface-variant uppercase tracking-widest leading-none">2,450 XP</span>
  </div>
</div>
<div class="absolute left-1/2 -translate-x-1/2 text-center">
  <h1 class="font-display-calligraphy text-headline-lg-mobile text-primary neon-glow leading-none">BenGo</h1>
</div>
<div class="flex items-center gap-sm flex-1 justify-end">
  <button class="w-10 h-10 flex items-center justify-center rounded-xl skeuo-button-dark hover:opacity-80 transition-opacity">
    <span class="material-symbols-outlined text-primary">leaderboard</span>
  </button>
  <button class="w-10 h-10 flex items-center justify-center rounded-xl skeuo-button-dark hover:opacity-80 transition-opacity">
    <span class="material-symbols-outlined text-primary">notifications</span>
  </button>
</div></header>
<!-- Gameplay Area -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile pt-24 pb-32">
<!-- Progress Bar -->
<div class="w-full max-w-md h-2.5 rounded-full overflow-hidden mb-12 progress-track">
<div class="timer-fill h-full rounded-full"></div>
</div>
<!-- Target Card -->
<div class="relative w-full max-w-sm aspect-square flex flex-col items-center justify-center skeuo-raised rounded-[2.5rem] p-8">
<!-- Inset glow container -->
<div class="absolute inset-4 rounded-[2rem] skeuo-inset opacity-60"></div>
<div class="relative text-center z-10">
<span class="font-label-mono text-primary text-[11px] uppercase tracking-[0.4em] mb-6 block opacity-80">Battle_Target</span>
<h1 class="font-display-calligraphy text-[96px] text-on-surface tracking-tighter neon-glow">
                    にほん
                </h1>
<div class="mt-8 flex justify-center gap-4">
<span class="w-2 h-2 rounded-full bg-surface-dim border border-white/5"></span>
<span class="w-2 h-2 rounded-full bg-primary animate-pulse shadow-[0_0_8px_#dc143c]"></span>
<span class="w-2 h-2 rounded-full bg-surface-dim border border-white/5"></span>
</div>
</div>
<!-- Tech accents -->
<div class="absolute top-6 left-6 w-4 h-4 border-t-2 border-l-2 border-primary/40"></div>
<div class="absolute bottom-6 right-6 w-4 h-4 border-b-2 border-r-2 border-primary/40"></div>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-2 gap-5 w-full max-w-md mt-12">
<button class="skeuo-button-dark group py-6 px-4 flex flex-col items-center justify-center rounded-xl transition-all">
<span class="font-headline-lg-mobile text-[18px] text-on-surface group-active:text-primary transition-colors">Japan</span>
</button>
<button class="skeuo-button-dark group py-6 px-4 flex flex-col items-center justify-center rounded-xl transition-all">
<span class="font-headline-lg-mobile text-[18px] text-on-surface group-active:text-primary transition-colors">Book</span>
</button>
<button class="skeuo-button-dark group py-6 px-4 flex flex-col items-center justify-center rounded-xl transition-all">
<span class="font-headline-lg-mobile text-[18px] text-on-surface group-active:text-primary transition-colors">Home</span>
</button>
<button class="skeuo-button-dark group py-6 px-4 flex flex-col items-center justify-center rounded-xl transition-all">
<span class="font-headline-lg-mobile text-[18px] text-on-surface group-active:text-primary transition-colors">Water</span>
</button>
</div>
</main>
<!-- Bottom Navigation -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-safe bg-surface-container/95 backdrop-blur-lg border-t border-white/5 h-20 shadow-[0_-8px_24px_rgba(0,0,0,0.5)]"><a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all group" href="#">
<span class="material-symbols-outlined text-[24px] mb-1 group-hover:scale-110">dashboard</span>
<span class="font-label-mono text-[9px] uppercase tracking-widest">Dashboard</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all group" href="#">
<span class="material-symbols-outlined text-[24px] mb-1 group-hover:scale-110">menu_book</span>
<span class="font-label-mono text-[9px] uppercase tracking-widest">Courses</span>
</a>
<a class="flex flex-col items-center justify-center relative -top-3" href="#">
<div class="w-14 h-14 bg-primary rounded-xl flex items-center justify-center shadow-[0_0_20px_rgba(220,20,60,0.5)] border border-white/20">
<span class="material-symbols-outlined text-[28px] text-white">groups</span>
</div>
<span class="font-label-mono text-[9px] text-primary font-bold uppercase tracking-widest mt-2">Teams</span>
</a>
<a class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary transition-all group" href="#">
<span class="material-symbols-outlined text-[24px] mb-1 group-hover:scale-110">account_circle</span>
<span class="font-label-mono text-[9px] uppercase tracking-widest">Profile</span>
</a></nav>
</div>
<script>
    // Subtle Haptic Feedback simulation
    document.querySelectorAll('button').forEach(button => {
        button.addEventListener('touchstart', () => {
            if (window.navigator.vibrate) window.navigator.vibrate(15);
        });
    });
</script>






</body></html>
