<script>
(function() {
  const canvas = document.getElementById('shader-canvas-ANIMATION_24');

  // Sync the WebGL drawing-buffer size with the CSS-driven layout size.
  // This fires on initial layout and whenever the element is resized.
  function syncSize() {
    const w = canvas.clientWidth  || 1280;
    const h = canvas.clientHeight || 720;
    if (canvas.width !== w || canvas.height !== h) {
      canvas.width  = w;
      canvas.height = h;
    }
  }
  if (typeof ResizeObserver !== 'undefined') {
    new ResizeObserver(syncSize).observe(canvas);
  }
  syncSize();

  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return;
  const vs = `attribute vec2 a_position;
varying vec2 v_texCoord;
void main() {
  v_texCoord = a_position * 0.5 + 0.5;
  gl_Position = vec4(a_position, 0.0, 1.0);
}`;
  const fs = `precision highp float;
varying vec2 v_texCoord;
uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;

// Helper for noise/glow
float hash(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
}

void main() {
    vec2 uv = v_texCoord;
    vec2 center = uv - 0.5;
    center.x *= u_resolution.x / u_resolution.y;
    
    // Base gradient - Tactile Zen blue/white palette
    vec3 color1 = vec3(0.96, 0.98, 1.0); // Surface bright
    vec3 color2 = vec3(0.84, 0.86, 0.88); // Surface dim
    vec3 baseColor = mix(color1, color2, uv.y + 0.2 * sin(u_time * 0.5));
    
    // Light rays (Cyber Sprint influence)
    float angle = atan(center.y, center.x);
    float dist = length(center);
    float rays = sin(angle * 8.0 + u_time * 1.2) * 0.5 + 0.5;
    rays *= pow(1.0 - dist, 2.0);
    vec3 rayColor = vec3(0.86, 0.08, 0.24) * rays * 0.15; // Primary red accent
    
    // Floating "Knowledge Particles"
    float particles = 0.0;
    for(float i = 0.0; i < 15.0; i++) {
        vec2 pPos = vec2(hash(vec2(i, 1.0)), hash(vec2(i, 2.0)));
        pPos.y = fract(pPos.y + u_time * 0.05);
        pPos.x += 0.05 * sin(u_time * 0.2 + i);
        float pSize = 0.002 + 0.003 * hash(vec2(i, 3.0));
        float pDist = length(uv - pPos);
        particles += smoothstep(pSize, 0.0, pDist);
    }
    
    // Mouse interaction glow
    vec2 mouseUV = u_mouse / u_resolution;
    float mouseGlow = smoothstep(0.4, 0.0, length(uv - mouseUV));
    vec3 interaction = vec3(1.0, 0.9, 0.7) * mouseGlow * 0.3;
    
    vec3 finalColor = baseColor + rayColor + vec3(1.0) * particles + interaction;
    
    // Vignette for depth
    finalColor *= 1.0 - 0.3 * dist;
    
    gl_FragColor = vec4(finalColor, 1.0);
}`;
  function cs(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, cs(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, cs(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const pos = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(pos);
  gl.vertexAttribPointer(pos, 2, gl.FLOAT, false, 0, 0);
  const uTime = gl.getUniformLocation(prog, 'u_time');
  const uRes = gl.getUniformLocation(prog, 'u_resolution');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  // u_mouse is in pixel coordinates matching u_resolution (ShaderToy convention).
  // Shaders that need normalized coords should use: u_mouse / u_resolution.
  let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
  window.addEventListener('mousemove', (event) => {
    const rect = canvas.getBoundingClientRect();
    if (rect.width && rect.height) {
      const nx = (event.clientX - rect.left) / rect.width;
      const ny = 1.0 - (event.clientY - rect.top) / rect.height;
      mouse.x = nx * canvas.width;
      mouse.y = ny * canvas.height;
    }
  });

  function render(t) {
    if (typeof ResizeObserver === 'undefined') syncSize();
    gl.viewport(0, 0, canvas.width, canvas.height);
    if (uTime) gl.uniform1f(uTime, t * 0.001);
    if (uRes) gl.uniform2f(uRes, canvas.width, canvas.height);
    if (uMouse) gl.uniform2f(uMouse, mouse.x, mouse.y);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(render);
  }
  render(0);
})();
</script>

<!-- Script for Particle Ring Creation -->
<script>
        const container = document.getElementById('portalContainer');
        const particleCount = 40;

        function createSpark() {
            const spark = document.createElement('div');
            spark.className = 'spark-particle';
            
            // Randomize starting delay and duration
            const delay = Math.random() * 2;
            const duration = 1.5 + Math.random() * 1.5;
            
            // Randomize offset within the ring
            const size = 1 + Math.random() * 3;
            spark.style.width = `${size}px`;
            spark.style.height = `${size}px`;
            
            spark.style.animation = `spark-orbit ${duration}s linear ${delay}s infinite`;
            
            container.appendChild(spark);
        }

        for (let i = 0; i < particleCount; i++) {
            createSpark();
        }

        // Micromovement on mouse move for parallax feel
        document.addEventListener('mousemove', (e) => {
            const x = (window.innerWidth / 2 - e.pageX) / 50;
            const y = (window.innerHeight / 2 - e.pageY) / 50;
            const badges = document.querySelectorAll('.animate-float, .animate-float-delayed');
            
            badges.forEach(badge => {
                badge.style.transform = `translate(${x}px, ${y}px)`;
            });
        });
    </script>
