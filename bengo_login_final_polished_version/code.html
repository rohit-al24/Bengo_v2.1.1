<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Glassmorphic Elevated Tactile Card */
        .tactile-card {
            background: rgba(246, 249, 255, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: -10px -10px 20px rgba(255, 255, 255, 0.6), 10px 10px 20px rgba(18, 22, 27, 0.05), inset 1px 1px 2px rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.8);
        }

        .neumorphic-sunken {
            background: rgba(246, 249, 255, 0.5);
            box-shadow: inset -4px -4px 8px rgba(255, 255, 255, 0.7), inset 4px 4px 8px rgba(18, 22, 27, 0.06);
            border: 1px solid transparent;
        }
        
        .neumorphic-sunken:focus-within {
            border: 1px solid rgba(220,20,60,0.2);
            box-shadow: inset -4px -4px 8px rgba(255, 255, 255, 0.8), inset 4px 4px 8px rgba(220, 20, 60, 0.08);
        }

        /* Deeply Extruded Crimson Key */
        .premium-cta {
            background: linear-gradient(145deg, #d40034 0%, #a30028 100%);
            box-shadow: -6px -6px 12px rgba(255, 255, 255, 0.6), 
                        6px 6px 16px rgba(177, 0, 44, 0.3), 
                        inset 2px 2px 4px rgba(255, 255, 255, 0.4),
                        inset -2px -2px 4px rgba(0,0,0,0.2);
            text-shadow: 0px 1px 2px rgba(0,0,0,0.3);
            border: 1px solid #e3183d;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .premium-cta:hover {
            transform: scale(1.02);
            box-shadow: -8px -8px 16px rgba(255, 255, 255, 0.7), 
                        8px 8px 20px rgba(177, 0, 44, 0.4), 
                        inset 2px 2px 4px rgba(255, 255, 255, 0.5),
                        inset -2px -2px 4px rgba(0,0,0,0.2);
        }

        .premium-cta:active {
            background: linear-gradient(145deg, #a30028 0%, #d40034 100%);
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.3), inset -4px -4px 8px rgba(255,255,255,0.1),
                        0 0 10px rgba(227, 24, 61, 0.4);
            transform: translateY(2px) scale(0.98);
            border: 1px solid transparent;
        }
        
        /* Circular Social Buttons */
        .social-circle {
            background: rgba(246, 249, 255, 0.8);
            backdrop-filter: blur(5px);
            box-shadow: -6px -6px 12px rgba(255, 255, 255, 0.9), 6px 6px 12px rgba(18, 22, 27, 0.08), inset 1px 1px 2px rgba(255,255,255,0.9);
            border: 1px solid rgba(255,255,255,0.8);
            transition: all 0.2s ease;
        }
        
        .social-circle:hover {
            transform: translateY(-2px);
            box-shadow: -8px -8px 16px rgba(255, 255, 255, 1), 8px 8px 16px rgba(18, 22, 27, 0.1), inset 1px 1px 2px rgba(255,255,255,0.9);
        }

        .social-circle:active {
            box-shadow: inset -4px -4px 8px rgba(255, 255, 255, 0.8), inset 4px 4px 8px rgba(18, 22, 27, 0.1);
            transform: scale(0.94);
            border: 1px solid transparent;
        }

        body {
            height: 100dvh;
            overflow: hidden;
        }
    </style>

<body class="relative flex flex-col font-body-md text-on-surface selection:bg-primary-fixed bg-transparent">

</div>
</div>
</header>

<div class="tactile-card rounded-[32px] p-8 mb-10 w-full">
<div class="space-y-8">
<!-- Email Field -->

</div>

<input class="bg-transparent border-none focus:ring-0 w-full font-label-mono text-[16px] text-on-surface placeholder:text-outline-variant/60 tracking-widest" placeholder="••••••••" type="password">
