<body class="font-body-md text-on-background p-margin-mobile" data-mode="connect">
<!-- Progress Header -->
<header class="w-full max-w-md mx-auto mb-xl pt-md">
<div class="flex justify-between items-center mb-sm">
<span class="font-label-mono text-label-mono text-primary uppercase">Stage 1 of 4</span>
<span class="font-label-mono text-label-mono text-outline">Personal Details</span>
</div>
<div class="h-4 w-full bg-surface-container-low rounded-full progress-well overflow-hidden">
<div class="h-full bg-primary-container transition-all duration-700 ease-out relative" id="progress-bar" style="width: 25%;">
<div class="absolute inset-0 bg-white/20 blur-sm"></div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center w-full max-w-md mx-auto">
<div class="w-full mb-lg text-center">
<h1 class="font-display-calligraphy text-headline-lg-mobile text-primary mb-xs">BenGo</h1>
<p class="font-body-md text-on-surface-variant">Let's start with the basics.</p>
</div>
<form class="w-full space-y-lg" id="onboarding-form">
<!-- Name Row -->
<div class="grid grid-cols-2 gap-md">
<div class="space-y-sm">
<label class="font-label-mono text-label-mono px-xs text-outline">First Name</label>
<div class="neumorphic-sunken bg-surface rounded-xl p-xs border-0">
<input class="w-full bg-transparent border-0 focus:ring-0 font-body-md px-md py-sm placeholder-surface-variant text-on-surface" placeholder="John" type="text">
</div>
</div>
<div class="space-y-sm">
<label class="font-label-mono text-label-mono px-xs text-outline">Last Name</label>
<div class="neumorphic-sunken bg-surface rounded-xl p-xs border-0">
<input class="w-full bg-transparent border-0 focus:ring-0 font-body-md px-md py-sm placeholder-surface-variant text-on-surface" placeholder="Doe" type="text">
</div>
</div>
</div>
<!-- Email -->
<div class="space-y-sm">
<label class="font-label-mono text-label-mono px-xs text-outline">Email ID</label>
<div class="neumorphic-sunken bg-surface rounded-xl p-xs flex items-center">
<span class="material-symbols-outlined text-outline ml-md">mail</span>
<input class="w-full bg-transparent border-0 focus:ring-0 font-body-md px-md py-sm placeholder-surface-variant text-on-surface" placeholder="john@example.com" type="email">
</div>
</div>
<!-- Password -->
<div class="space-y-sm">
<label class="font-label-mono text-label-mono px-xs text-outline">Password</label>
<div class="neumorphic-sunken bg-surface rounded-xl p-xs flex items-center">
<span class="material-symbols-outlined text-outline ml-md">lock</span>
<input class="w-full bg-transparent border-0 focus:ring-0 font-body-md px-md py-sm placeholder-surface-variant text-on-surface" id="password" placeholder="••••••••" type="password">
</div>
</div>
<!-- Confirm Password & Match Indicator -->
<div class="space-y-sm relative">
<div class="flex justify-between items-center px-xs">
<label class="font-label-mono text-label-mono text-outline">Confirm Password</label>
<div class="flex items-center gap-1 transition-all duration-300 transform opacity-100 translate-y-0" id="match-indicator" style="font-variation-settings: &quot;FILL&quot; 1;">
<span class="material-symbols-outlined text-[16px] text-secondary" id="match-icon">check_circle</span>
<span class="font-label-mono text-[10px] uppercase text-secondary" id="match-text">Match</span>
</div>
</div>
<div class="neumorphic-sunken bg-surface rounded-xl p-xs flex items-center">
<span class="material-symbols-outlined text-outline ml-md">verified_user</span>
<input class="w-full bg-transparent border-0 focus:ring-0 font-body-md px-md py-sm placeholder-surface-variant text-on-surface" id="confirm-password" placeholder="••••••••" type="password">
</div>
</div>
</form>
</main>
<!-- Footer Action -->
<footer class="w-full max-w-md mx-auto mt-xl pb-lg">
<button class="w-full neumorphic-extruded bg-surface text-primary py-md rounded-xl font-headline-lg-mobile text-headline-lg-mobile neumorphic-button flex items-center justify-center gap-md transition-all" id="next-btn" onclick="window.location.href='{{DATA:SCREEN:SCREEN_78}}'">
            Next
            <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center mt-lg font-body-md text-on-surface-variant">
            Already have an account? <a class="text-primary font-bold hover:underline" href="#">Log in</a>
</p>
</footer>
<script>
        const passwordInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirm-password');
        const indicator = document.getElementById('match-indicator');
        const matchIcon = document.getElementById('match-icon');
        const matchText = document.getElementById('match-text');

        const validatePasswords = () => {
            const pass = passwordInput.value;
            const confirm = confirmInput.value;

            if (confirm.length === 0) {
                indicator.classList.add('opacity-0', 'translate-y-1');
                indicator.classList.remove('opacity-100', 'translate-y-0');
                return;
            }

            indicator.classList.remove('opacity-0', 'translate-y-1');
            indicator.classList.add('opacity-100', 'translate-y-0');

            if (pass === confirm && pass !== "") {
                matchIcon.innerText = 'check_circle';
                matchIcon.classList.remove('text-error');
                matchIcon.classList.add('text-secondary');
                matchText.innerText = 'Match';
                matchText.classList.remove('text-error');
                matchText.classList.add('text-secondary');
                indicator.style.fontVariationSettings = "'FILL' 1";
            } else {
                matchIcon.innerText = 'cancel';
                matchIcon.classList.remove('text-secondary');
                matchIcon.classList.add('text-error');
                matchText.innerText = 'No Match';
                matchText.classList.remove('text-secondary');
                matchText.classList.add('text-error');
                indicator.style.fontVariationSettings = "'FILL' 0";
            }
        };

        passwordInput.addEventListener('input', validatePasswords);
        confirmInput.addEventListener('input', validatePasswords);

        // Simple button interaction
        const nextBtn = document.getElementById('next-btn');
        nextBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // In a real app, transition to Stage 2
            nextBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">progress_activity</span>';
            setTimeout(() => {
                nextBtn.innerHTML = 'Next <span class="material-symbols-outlined">arrow_forward</span>';
            }, 1000);
        });
    </script>


</body></html>
