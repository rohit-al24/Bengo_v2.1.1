            70% { box-shadow: 0 0 0 10px rgba(59, 105, 52, 0); }

        }

        .shake { animation: shake 0.4s ease-in-out; }
        .pulse-success { animation: pulse-green 0.6s infinite; }

        .slide-out {
            transform: translateX(-150%);
            opacity: 0;
            transition: transform 0.5s ease-in, opacity 0.5s ease-in;
        }

        .slide-in {
            transform: translateX(150%);
            opacity: 0;
        }

            transform: translateX(0);

<script>
        // State Management
        let currentQuestion = 4;
        const totalQuestions = 10;
        let timeLeft = 299; // 4:59
        let isProcessing = false;

        const words = [
            { jp: "さようなら", en: "Goodbye", options: ["Hello", "Goodbye", "Please", "Excuse me"], correct: 1 },
            { jp: "ありがとう", en: "Thank you", options: ["Yes", "No", "Thank you", "Sorry"], correct: 2 },
            { jp: "おやすみ", en: "Good night", options: ["Good morning", "Good night", "Good evening", "Hi"], correct: 1 },
            { jp: "すみません", en: "Excuse me", options: ["Excuse me", "Wait", "Hurry", "Slowly"], correct: 0 }
        ];

        // Timer Logic
        function updateTimer() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            if (timeLeft > 0) timeLeft--;
        }
        setInterval(updateTimer, 1000);

        // Selection Logic
        function checkAnswer(btn, isCorrect) {
            if (isProcessing) return;
            isProcessing = true;

            const allBtns = document.querySelectorAll('.answer-btn');
            
            if (isCorrect) {
                btn.classList.add('bg-secondary-container', 'text-on-secondary-container', 'pulse-success', 'key-pressed');
                btn.innerHTML = `<span class="material-symbols-outlined align-middle mr-2">check_circle</span> Correct!`;
            } else {
                btn.classList.add('bg-error-container', 'text-on-error-container', 'shake', 'key-pressed');
                btn.innerHTML = `<span class="material-symbols-outlined align-middle mr-2">cancel</span> Wrong`;
                
                // Show the correct one
                allBtns.forEach(b => {
                    if (b.innerText.includes('Hello') || b.innerText.includes('Goodbye')) { // Mock logic for visual demo
                         // Could highlight correct here
                    }
                });
            }

            // Progression Delay
            setTimeout(() => {
                transitionNextQuestion();
            }, 2000);
        }

        function transitionNextQuestion() {
            const card = document.getElementById('word-card');
            const grid = document.getElementById('answers-grid');
            
            // Slide current out
            card.classList.remove('slide-active');
            card.classList.add('slide-out');
            grid.classList.add('opacity-0', 'transition-opacity', 'duration-500');

            setTimeout(() => {
                // Update State
                currentQuestion++;
                if (currentQuestion > totalQuestions) currentQuestion = 1; // Loop for demo
                
                const nextWordData = words[Math.floor(Math.random() * words.length)];
                
                // Update UI content
                document.getElementById('current-word').textContent = nextWordData.jp;
                document.getElementById('progress-text').textContent = `COMPLETED: ${currentQuestion}/${totalQuestions}`;
                document.getElementById('progress-bar').style.width = `${(currentQuestion/totalQuestions) * 100}%`;

                // Reset Buttons
                grid.innerHTML = nextWordData.options.map((opt, idx) => `
                    <button onclick="checkAnswer(this, ${idx === nextWordData.correct})" class="answer-btn p-md rounded-xl bg-surface key-shadow text-on-surface font-body-md border border-white/50 text-left hover:scale-[1.02]">
                        <span class="font-label-mono mr-2 text-outline">${String.fromCharCode(65 + idx)}</span> ${opt}
                    </button>
                `).join('');

                // Prepare for slide in
                card.classList.remove('slide-out');
                card.classList.add('slide-in');
                
                // Force Reflow
                void card.offsetWidth;

                // Slide in
                card.classList.remove('slide-in');
                card.classList.add('slide-active');
                grid.classList.remove('opacity-0');
                
                isProcessing = false;
            }, 600);
        }
    </script>
